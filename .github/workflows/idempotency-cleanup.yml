name: Idempotency Cleanup

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      retentionDays:
        description: "Retention window in days (1-30)"
        required: false
        default: "7"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Trigger cleanup endpoint
        env:
          CLEANUP_ENDPOINT_URL: ${{ secrets.CLEANUP_ENDPOINT_URL }}
          CLEANUP_CRON_TOKEN: ${{ secrets.CLEANUP_CRON_TOKEN }}
          RETENTION_DAYS: ${{ github.event.inputs.retentionDays || '7' }}
        run: |
          set -euo pipefail

          if [[ -z "${CLEANUP_ENDPOINT_URL}" ]]; then
            echo "::warning::Skipping idempotency cleanup: CLEANUP_ENDPOINT_URL secret is missing."
            exit 0
          fi

          if [[ -z "${CLEANUP_CRON_TOKEN}" ]]; then
            echo "::warning::Skipping idempotency cleanup: CLEANUP_CRON_TOKEN secret is missing."
            exit 0
          fi

          response_body_file="$(mktemp)"
          http_status="$({
            curl --silent --show-error \
              --retry 2 \
              --retry-all-errors \
              --connect-timeout 8 \
              --max-time 25 \
              --output "${response_body_file}" \
              --write-out "%{http_code}" \
              -X POST "${CLEANUP_ENDPOINT_URL}?retentionDays=${RETENTION_DAYS}" \
              -H "x-cron-token: ${CLEANUP_CRON_TOKEN}" \
              -H "content-type: application/json";
          })"

          echo "Cleanup endpoint HTTP status: ${http_status}"
          echo "Cleanup endpoint response:"
          cat "${response_body_file}"
          echo

          if [[ "${http_status}" -ge 400 ]]; then
            if [[ "${http_status}" == "401" ]]; then
              echo "::error::Unauthorized (401). Usually CLEANUP_CRON_TOKEN mismatch between GitHub secrets and Vercel env."
            elif [[ "${http_status}" == "404" ]]; then
              echo "::error::Not found (404). Check CLEANUP_ENDPOINT_URL points to /api/admin/idempotency/cleanup on the deployed domain."
            elif [[ "${http_status}" == "503" ]]; then
              echo "::error::Service unavailable (503). Usually CLEANUP_CRON_TOKEN is missing in Vercel environment or deployment not refreshed."
            else
              echo "::error::Cleanup endpoint returned HTTP ${http_status}."
            fi

            exit 1
          fi

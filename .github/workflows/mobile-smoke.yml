name: Mobile Smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment (staging or production)"
        required: true
        default: "staging"
      requireAuthChecks:
        description: "Run authenticated checks when token secret is available (1 or 0)"
        required: false
        default: "1"

jobs:
  mobile-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve target environment variables
        env:
          TARGET_ENV: ${{ github.event.inputs.target || 'staging' }}
          REQUIRE_AUTH: ${{ github.event.inputs.requireAuthChecks || '1' }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_BEARER_TOKEN: ${{ secrets.STAGING_BEARER_TOKEN }}
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
          PROD_MOBILE_BEARER_TOKEN: ${{ secrets.PROD_MOBILE_BEARER_TOKEN }}
        run: |
          set -euo pipefail

          target="${TARGET_ENV}"
          if [[ "${target}" == "production" ]]; then
            base_url="${PROD_BASE_URL}"
            token="${PROD_MOBILE_BEARER_TOKEN}"
          else
            base_url="${STAGING_BASE_URL}"
            token="${STAGING_BEARER_TOKEN}"
          fi

          if [[ -z "${base_url}" ]]; then
            echo "Missing base URL secret for target=${target}."
            exit 1
          fi

          if [[ "${REQUIRE_AUTH}" == "1" && -z "${token}" ]]; then
            echo "Authenticated checks required but token secret is missing for target=${target}."
            exit 1
          fi

          if [[ "${REQUIRE_AUTH}" != "1" ]]; then
            token=""
          fi

          {
            echo "MOBILE_SMOKE_BASE_URL=${base_url}"
            echo "MOBILE_SMOKE_BEARER_TOKEN=${token}"
          } >> "$GITHUB_ENV"

      - name: Run mobile smoke checks
        run: npm run verify:mobile:smoke

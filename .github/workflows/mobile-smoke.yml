name: Mobile Smoke

on:
  schedule:
    - cron: "23 */2 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment (staging or production)"
        required: true
        default: "staging"
      requireAuthChecks:
        description: "Run authenticated checks when token secret is available (1 or 0)"
        required: false
        default: "1"

jobs:
  mobile-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve target environment variables
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_ENV_INPUT: ${{ github.event.inputs.target || 'staging' }}
          REQUIRE_AUTH_INPUT: ${{ github.event.inputs.requireAuthChecks || '1' }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_BEARER_TOKEN: ${{ secrets.STAGING_BEARER_TOKEN }}
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
          PROD_MOBILE_BEARER_TOKEN: ${{ secrets.PROD_MOBILE_BEARER_TOKEN }}
        run: |
          set -euo pipefail

          target="${TARGET_ENV_INPUT}"
          require_auth="${REQUIRE_AUTH_INPUT}"
          skip_run="0"

          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            target="staging"
            # Scheduled runs should not depend on long-lived auth tokens.
            require_auth="0"
          fi

          if [[ "${target}" == "production" ]]; then
            base_url="${PROD_BASE_URL}"
            token="${PROD_MOBILE_BEARER_TOKEN}"
          else
            base_url="${STAGING_BASE_URL}"
            token="${STAGING_BEARER_TOKEN}"
          fi

          if [[ -z "${base_url}" ]]; then
            if [[ "${EVENT_NAME}" == "schedule" ]]; then
              echo "Missing base URL secret for target=${target}; marking scheduled run as skipped."
              skip_run="1"
            else
              echo "Missing base URL secret for target=${target}."
              exit 1
            fi
          fi

          if [[ "${require_auth}" == "1" && -z "${token}" ]]; then
            if [[ "${EVENT_NAME}" == "schedule" ]]; then
              echo "Auth token missing for target=${target}; scheduled run will continue with public checks only."
              require_auth="0"
            else
              echo "Authenticated checks required but token secret is missing for target=${target}."
              exit 1
            fi
          fi

          if [[ "${require_auth}" != "1" ]]; then
            token=""
          fi

          {
            echo "MOBILE_SMOKE_TARGET=${target}"
            echo "MOBILE_SMOKE_REQUIRE_AUTH=${require_auth}"
            echo "MOBILE_SMOKE_BASE_URL=${base_url}"
            echo "MOBILE_SMOKE_BEARER_TOKEN=${token}"
            echo "MOBILE_SMOKE_SKIP=${skip_run}"
          } >> "$GITHUB_ENV"

      - name: Run header
        run: |
          {
            echo "## Mobile Smoke Run"
            echo "- target: ${MOBILE_SMOKE_TARGET}"
            echo "- auth checks: ${MOBILE_SMOKE_REQUIRE_AUTH}"
            echo "- base URL: ${MOBILE_SMOKE_BASE_URL}"
            echo "- skip run: ${MOBILE_SMOKE_SKIP}"
            echo "- trigger: ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip notice
        if: env.MOBILE_SMOKE_SKIP == '1'
        run: |
          {
            echo "## Mobile Smoke Skipped"
            echo "- reason: missing base URL secret for scheduled run"
            echo "- action: set STAGING_BASE_URL to enable checks"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run mobile smoke checks
        if: env.MOBILE_SMOKE_SKIP != '1'
        run: npm run verify:mobile:smoke

      - name: Failure alert summary
        if: failure()
        run: |
          echo "::error::Mobile smoke failed for target=${MOBILE_SMOKE_TARGET}. Follow release runbook and incident communication playbook."

          {
            echo "## Mobile Smoke Alert"
            echo "- status: failed"
            echo "- target: ${MOBILE_SMOKE_TARGET}"
            echo "- trigger: ${{ github.event_name }}"
            echo "- runbook: docs/ops/release-checklist-staging-production.md"
            echo "- comms: docs/ops/incident-communication-playbook.md"
            echo "- retry command: MOBILE_SMOKE_BASE_URL=${MOBILE_SMOKE_BASE_URL} npm run verify:mobile:smoke"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure webhook notification
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.MOBILE_SMOKE_ALERT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET: ${{ env.MOBILE_SMOKE_TARGET }}
          TRIGGER: ${{ github.event_name }}
          BASE_URL: ${{ env.MOBILE_SMOKE_BASE_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${WEBHOOK_URL}" ]]; then
            echo "MOBILE_SMOKE_ALERT_WEBHOOK_URL not set; skipping webhook notification."
            exit 0
          fi

          payload="{\"text\":\"[Mobile Smoke Alert] status=failed target=${TARGET} trigger=${TRIGGER} baseUrl=${BASE_URL} run=${RUN_URL} runbook=docs/ops/release-checklist-staging-production.md comms=docs/ops/incident-communication-playbook.md\"}"

          curl --silent --show-error --fail \
            -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data "${payload}" \
            || true

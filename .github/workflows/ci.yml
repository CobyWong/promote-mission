name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm --prefix apps/mobile ci

      - name: Environment and secret checks
        run: npm run check:env

      - name: Lint
        run: npm run lint

      - name: Typecheck web
        run: npm run typecheck

      - name: Typecheck mobile
        run: npm run mobile:typecheck

      - name: Integration tests
        run: npm run test

      - name: Build web
        run: npm run build
